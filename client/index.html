<!DOCTYPE html>
<html>

<head>

  <title>Advanced CRM</title>

  <link rel="stylesheet"
    href="style.css">

  <!-- ChartJS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

  <!-- Login -->

  <div class="login-container"
    id="loginPage">

    <h1>Admin Login</h1>

    <input type="text"
      id="username"
      placeholder="Username">

    <input type="password"
      id="password"
      placeholder="Password">

    <button onclick="login()">
      Login
    </button>

  </div>

  <!-- Dashboard -->

  <div class="container"
    id="dashboard"
    style="display:none;">

    <h1>
      CRM Dashboard
    </h1>

    <!-- Dark Mode -->

    <button onclick="toggleTheme()">
      Toggle Theme
    </button>

    <!-- Form -->

    <div class="form-container">

      <input type="text"
        id="name"
        placeholder="Client Name">

      <input type="email"
        id="email"
        placeholder="Client Email">

      <select id="status">

        <option>
          New
        </option>

        <option>
          Contacted
        </option>

        <option>
          Converted
        </option>

      </select>

      <textarea id="notes"
        placeholder="Notes">
      </textarea>

      <button onclick="addLead()">
        Add Lead
      </button>

      <button onclick="exportCSV()">
        Export CSV
      </button>

    </div>

    <!-- Analytics -->

    <canvas id="leadChart">
    </canvas>

    <!-- Lead List -->

    <div id="leadList">
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
